<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Warm paper background -->
  <rect width="64" height="64" rx="10" fill="#F5F0E8"/>

  <!-- Subtle warm border -->
  <rect width="64" height="64" rx="10" fill="none" stroke="#D4C4A8" stroke-width="2"/>

  <!-- T — dark ink, bold serif -->
  <text
    x="11"
    y="47"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="#1A1714"
  >T</text>

  <!-- L — gold, italic -->
  <text
    x="35"
    y="47"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-style="italic"
    font-weight="400"
    fill="#B8915A"
  >L</text>

</svg>
